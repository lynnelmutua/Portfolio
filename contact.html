<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- REQUIRED for responsive design on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Lynnel Mutua — Computing student at JKUAT">
  <title>Lynnel Mutua | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Skip link: allows keyboard users to skip the nav -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <header>
    <div class="container">
      <a href="index.html" class="logo">Lynnel Mutua</a>
      <nav aria-label="Main navigation">
        <ul>
          <!-- Add class="active" to the current page's link -->
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <!-- PAGE-SPECIFIC CONTENT GOES HERE -->
     <section class="contact-section">
  <div class="container">
    <h1>Contact Lynnel Mutua</h1>
    <p>Have a question or want to work together? Fill out the form below and I'll get back to you as soon as possible.</p>

    <form class="contact-form" action="#" method="POST" novalidate>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name"
               placeholder="Lynnel Mutua" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" 
               placeholder="lynnel.mutua@example.com" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option value="">Select a subject</option>
          <option>Project Collaboration</option>
          <option>Networking Inquiry</option>
          <option>Web Development Opportunity</option>
          <option>General Message</option>
        </select>
      </div>

      <div class="form-group">
        <label for="msg">Message</label>
        <textarea id="msg" name="message" rows="5" 
                  placeholder="Tell me more about your project..." required></textarea>
      </div>

      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</section>
</main>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Lynnel Mutua — ICS 2215, Dept. of Computing</p>
    </div>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
